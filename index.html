<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智淨城市 - AI 智能廢物分類</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f6; padding: 20px; margin: 0; }
        h1 { color: #2c3e50; font-size: 24px; }
        p { color: #7f8c8d; }
        #video-container { margin: 20px auto; width: 100%; max-width: 400px; border: 4px solid #27ae60; border-radius: 12px; overflow: hidden; background: #000; position: relative; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; display: block; margin: 0 auto; }
        .btn { background-color: #27ae60; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:hover { background-color: #2ecc71; }
        .upload-btn { background-color: #2980b9; }
        .upload-btn:hover { background-color: #3498db; }
        #result { margin: 20px auto; max-width: 400px; font-size: 18px; font-weight: bold; padding: 15px; border-radius: 8px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); word-wrap: break-word; }
        .incinerable { background-color: #e67e22; color: white; }
        .recyclable { background-color: #3498db; color: white; }
        .non-recyclable { background-color: #e74c3c; color: white; }
        .loading { background-color: #95a5a6; color: white; }
        .error { background-color: #34495e; color: #ffcccb; text-align: left; font-size: 14px;}
        /* 預覽上傳的圖片 */
        #preview-img { max-width: 100%; display: none; margin: 0 auto; }
    </style>
</head>
<body>

    <h1>智淨城市 AI 分類掃描</h1>
    <p>請掃描廢物，或使用「上傳相片」功能測試！</p>

    <div id="video-container">
        <video id="camera" autoplay playsinline></video>
        <img id="preview-img" alt="上傳預覽">
    </div>

    <div>
        <button id="scan-btn" class="btn">📷 掃描相機畫面</button>
        
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <button id="upload-btn" class="btn upload-btn">📁 上傳垃圾相片</button>
    </div>
    
    <canvas id="snapshot" style="display: none;"></canvas>
    
    <div id="result"></div>

    <script>
        const video = document.getElementById('camera');
        const canvas = document.getElementById('snapshot');
        const scanBtn = document.getElementById('scan-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const resultDiv = document.getElementById('result');

        // 1. 嘗試啟動相機
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
            } catch (err) {
                console.log("提示: 找不到相機，請使用上傳圖片功能。");
                video.style.display = 'none'; 
            }
        }

        // 2. 觸發上傳檔案 (加入圖片壓縮加速)
        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // 顯示預覽
                previewImg.style.display = 'block';
                video.style.display = 'none';
                previewImg.src = e.target.result;
                
                // 創建一個圖片物件用嚟縮圖
                const img = new Image();
                img.onload = function() {
                    compressAndSend(img);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 3. 處理點擊相機掃描 (加入圖片壓縮加速)
        scanBtn.addEventListener('click', () => {
            if (video.style.display === 'none' || video.videoWidth === 0) {
                alert("相機未啟動，請使用「上傳垃圾相片」功能！");
                return;
            }
            previewImg.style.display = 'none';
            video.style.display = 'block';
            compressAndSend(video);
        });

        // 🔥 新增：共用的「極速壓縮」函數 🔥
        function compressAndSend(source) {
            const context = canvas.getContext('2d');
            
            // 設定 AI 最易消化的最大寬度 (512px)
            const MAX_WIDTH = 512; 
            let width = source.videoWidth || source.width;
            let height = source.videoHeight || source.height;
            
            // 按比例縮小
            if (width > MAX_WIDTH) {
                height = Math.floor(height * (MAX_WIDTH / width));
                width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            context.drawImage(source, 0, 0, width, height);
            
            // 降低品質至 0.6，極大減少傳輸時間
            const base64Data = canvas.toDataURL('image/jpeg', 0.6);
            
            callGeminiAPI(base64Data);
        }

        // ==========================================
        // 核心 AI 呼叫功能
        // ==========================================
        async function callGeminiAPI(imageData) {
            resultDiv.style.display = 'block';
            resultDiv.className = 'loading';
            resultDiv.innerText = "⏳ 傳送中... (極速模式)"; // 提示改咗

            try {
                const apiUrl = 'https://yinli.one/v1/chat/completions';
                const apiKey = 'sk-AG0EJbAgjvM7yTLfZclzSRhcBjyYorY5eQpjGvLOe5O1zD1U';

                // 紀錄開始時間，俾你睇吓究竟有幾快
                const startTime = Date.now(); 

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gemini-2.5-flash", 
                        messages: [
                            {
                                role: "user",
                                content: [
                                    {
                                        type: "text",
                                        text: "這是一件廢棄物。請分析圖片中的物品，並嚴格只回答以下三個選項之一：可焚燒、可回收、不可回收。不要提供任何其他解釋。"
                                    },
                                    {
                                        type: "image_url",
                                        image_url: { url: imageData }
                                    }
                                ]
                            }
                        ],
                        max_tokens: 20, // 既然 AI 識聽話，縮返細個字數限制可以令佢回覆得再快啲
                        temperature: 0.1
                    })
                });
                
                if (!response.ok) {
                    const errorDetail = await response.text();
                    throw new Error(`HTTP 狀態碼: ${response.status}\n錯誤詳情: ${errorDetail}`);
                }
                
                const data = await response.json();
                
                // 計算用咗幾多秒
                const timeTaken = ((Date.now() - startTime) / 1000).toFixed(1);
                console.log(`⏱️ AI 分析耗時: ${timeTaken} 秒`);
                console.log("AI 完整回應:", data);

                if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                    throw new Error("API 回傳格式異常");
                }

                const resultText = data.choices[0].message.content.trim();
                displayResult(resultText, timeTaken); 

            } catch (error) {
                console.error("API 錯誤:", error);
                resultDiv.className = 'error';
                resultDiv.innerText = `❌ 分析失敗！\n\n系統訊息：\n${error.message}`;
            }
        }

        // 顯示結果顏色 (加入耗時顯示)
        function displayResult(category, timeTaken) {
            if (category.includes('可焚燒')) {
                resultDiv.className = 'incinerable';
                resultDiv.innerText = `🔥 分類結果：可焚燒\n(耗時: ${timeTaken}秒)`;
            } else if (category.includes('可回收') && !category.includes('不可回收')) {
                resultDiv.className = 'recyclable';
                resultDiv.innerText = `♻️ 分類結果：可回收\n(耗時: ${timeTaken}秒)`;
            } else if (category.includes('不可回收')) {
                resultDiv.className = 'non-recyclable';
                resultDiv.innerText = `🚫 分類結果：不可回收\n(耗時: ${timeTaken}秒)`;
            } else {
                resultDiv.className = 'loading';
                resultDiv.innerText = `⚠️ 未知分類: ${category}`;
            }
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
